name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true

      - name: Install CDK + lint + docs (and test for pytest plugins referenced by configs)
        run: uv sync --group cdk --group test --group lint --group docs

      - name: Run pre-commit hooks
        run: uv run pre-commit run --all-files

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true

      - name: Install Lambda runtime + test runner
        run: uv sync --only-group lambda --only-group test

      - name: Run unit tests
        env:
          AWS_DEFAULT_REGION: us-east-1
        run: uv run pytest tests/unit -v

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: coverage-report
          path: report.html

  cdk-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: "22"

      - name: Install CDK + test runner
        run: uv sync --group cdk --group test

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Run cdk synth
        env:
          CDK_DEFAULT_ACCOUNT: "123456789012"
          CDK_DEFAULT_REGION: us-east-1
          AWS_DEFAULT_REGION: us-east-1
        run: cdk synth --quiet

      - name: Run CDK stack assertion tests
        env:
          AWS_DEFAULT_REGION: us-east-1
        run: uv run pytest tests/cdk -v --override-ini="addopts=" --timeout=120
