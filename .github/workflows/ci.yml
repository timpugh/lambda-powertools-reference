name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pip-tools
        run: pip install pip-tools

      - name: Install dev dependencies
        run: pip-sync requirements.txt

      - name: Run pre-commit hooks
        run: pre-commit run --all-files

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pip-tools
        run: pip install pip-tools

      - name: Install test and lambda dependencies
        run: pip-sync tests/requirements.txt lambda/requirements.txt

      - name: Run unit tests
        env:
          AWS_DEFAULT_REGION: us-east-1
        run: python -m pytest tests/unit -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: report.html

  cdk-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install pip-tools
        run: pip install pip-tools

      - name: Install CDK and dev dependencies
        run: pip-sync requirements.txt

      - name: Install pytest (separate from pip-sync to avoid attrs conflict)
        run: pip install pytest pytest-mock pytest-timeout

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Run cdk synth
        env:
          CDK_DEFAULT_ACCOUNT: "123456789012"
          CDK_DEFAULT_REGION: us-east-1
          AWS_DEFAULT_REGION: us-east-1
        run: cdk synth --quiet

      - name: Run CDK stack assertion tests
        env:
          AWS_DEFAULT_REGION: us-east-1
        run: python -m pytest tests/cdk -v --override-ini="addopts=" --timeout=120
