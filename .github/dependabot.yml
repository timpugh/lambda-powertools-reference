version: 2

updates:
  # GitHub Actions — checks workflow YAML for newer action versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    # Supply-chain safety: wait N days after a release before opening a PR.
    # Fresh releases are the window in which malicious versions (tag-hijacks,
    # compromised maintainer accounts, typo-squats) typically get caught and
    # yanked. 3–7 days is generally enough to dodge the worst of it. Larger
    # version jumps wait longer so major rewrites have time to surface bugs.
    cooldown:
      default-days: 5
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3

  # Python — Lambda runtime dependencies (lambda/requirements.in → lambda/requirements.txt)
  # Dependabot auto-detects pip-compile mode from the lock file header and
  # regenerates the .txt file (with hashes) whenever it bumps a pin in the .in.
  #
  # Grouped updates collapse the weekly PR volume from one-per-package to
  # one-per-group. Each group regenerates the lock file as a single atomic
  # update, which prevents the cross-package version skew that hits
  # boto3/botocore/aws-lambda-powertools when they are bumped individually.
  - package-ecosystem: "pip"
    directory: "/lambda"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    cooldown:
      default-days: 5
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
    ignore:
      # attrs is pinned at 26.1.0 for Powertools and cannot be upgraded without
      # breaking CDK (which requires 25.4.0). This is a documented, intentional
      # conflict — see README "attrs version conflict" section.
      - dependency-name: "attrs"
    groups:
      aws:
        patterns:
          - "aws-*"
          - "boto*"
          - "botocore*"
          - "s3transfer"
      patches:
        update-types:
          - "patch"

  # Python — test dependencies (tests/requirements.in → tests/requirements.txt)
  - package-ecosystem: "pip"
    directory: "/tests"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    cooldown:
      default-days: 5
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
    ignore:
      - dependency-name: "attrs"
    groups:
      aws:
        patterns:
          - "aws-*"
          - "boto*"
          - "botocore*"
          - "s3transfer"
      pytest:
        patterns:
          - "pytest"
          - "pytest-*"
      patches:
        update-types:
          - "patch"

  # Python — dev/CDK dependencies (requirements.in → requirements.txt)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    cooldown:
      default-days: 5
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
    ignore:
      - dependency-name: "attrs"
    groups:
      aws-cdk:
        patterns:
          - "aws-cdk*"
          - "cdk-*"
          - "constructs"
      aws:
        patterns:
          - "aws-*"
          - "boto*"
          - "botocore*"
          - "s3transfer"
      sphinx:
        patterns:
          - "sphinx"
          - "sphinx-*"
          - "myst-parser"
      linting:
        patterns:
          - "ruff"
          - "mypy"
          - "pylint"
          - "bandit"
          - "pip-audit"
          - "pre-commit"
          - "radon"
          - "xenon"
      patches:
        update-types:
          - "patch"
