repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.0
    hooks:
      - id: mypy
        additional_dependencies: [boto3-stubs, aws-cdk-lib]
        args: [--ignore-missing-imports]
        exclude: ^(app\.py|tests/)

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: [-c, .bandit]

  - repo: local
    hooks:
      - id: pylint
        name: pylint design checks
        entry: pylint
        language: system
        types: [python]
        exclude: ^(tests|docs)/

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json

  - repo: local
    hooks:
      - id: xenon
        name: xenon complexity check
        entry: xenon --max-absolute B --max-modules A --max-average A lambda/
        language: system
        types: [python]
        pass_filenames: false
      - id: pip-audit
        name: pip-audit vulnerability scan
        entry: pip-audit
        language: system
        pass_filenames: false
        always_run: true
